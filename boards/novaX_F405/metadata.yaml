board: novaX_F405
platform:
  - ardupilot
  - betaflight
mcu: STM32F405xx
bootloader_board_id: AP_HW_SPEEDYBEEF4V4
source_tree: firmware/ardupilot
board_config: boards/novaX_F405/ardupilot
sensors:
  imu: Invensensev3
  barometer: SPL06
  gps: MAX-M10S
  compass: QMC5883P
ports:
  serial1: MAX-M10S GPS
  serial2: RCIN
  serial3: VTX
  uart4: ELRS
  uart5: ESC telemetry
  serial6: spare
i2c:
  bus1:
    - QMC5883P
    - SPL06
